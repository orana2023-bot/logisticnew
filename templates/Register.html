<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - TransGlobal</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="/css/Register.css">
</head>

<body>

<div class="register-container">

    <!-- LEFT -->
    <div class="register-left">
        <h2>Welcome to TransGlobal</h2>
        <p>
            Join our global logistics platform and start shipping smarter.
            Fast, secure and reliable delivery worldwide.
        </p>
    </div>

    
    <div class="register-right">
        <h2>Create Account</h2>

        <!-- Custom Premium Light Alert Notification -->
        <div id="alertBox" class="alert-box" style="display: none;">
            <i id="alertIcon" class="fas"></i>
            <span id="alertMessage"></span>
        </div>

        <form id="registerForm">

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="fullName" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label>Phone</label>
                <input type="tel" id="phone" placeholder="Enter your phone number" required>
            </div>

            <div class="form-group password-box">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
                <i class="fa-solid fa-eye" onclick="togglePassword()"></i>
            </div>

            <div class="form-group password-box">
                <label>Confirm Password</label>
                <input type="password" id="confirm" placeholder="Confirm your password" required>
            </div>

            <button type="submit" class="register-btn">Register</button>

        </form>

        <div class="extra-links">
            Already have an account? <a href="/templates/login.html">Login</a>
        </div>

        <div class="social-login">
            <p>Or sign up with</p>
            <i class="fa-brands fa-google"></i>
            <i class="fa-brands fa-facebook"></i>
            <i class="fa-brands fa-x-twitter"></i>
        </div>

    </div>

</div>

<script>
function togglePassword() {
    const pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
}

// Premium alert rendering function
function showAlert(message, type) {
    const alertBox = document.getElementById("alertBox");
    const alertIcon = document.getElementById("alertIcon");
    const alertMessage = document.getElementById("alertMessage");
    
    alertMessage.textContent = message;
    alertBox.className = "alert-box alert-" + type;
    
    if (type === "success") {
        alertIcon.className = "fas fa-check-circle";
    } else {
        alertIcon.className = "fas fa-exclamation-circle";
    }
    
    alertBox.style.display = "flex";
}

document.getElementById("registerForm").addEventListener("submit", function (e) {
    e.preventDefault();
    const fullNameVal = document.getElementById("fullName").value;
    const emailVal = document.getElementById("email").value;
    const phoneVal = document.getElementById("phone").value;
    const passwordVal = document.getElementById("password").value;
    const confirmVal = document.getElementById("confirm").value;

    if (passwordVal !== confirmVal) {
        showAlert("Passwords do not match!", "error");
        return;
    }

    fetch('/api/register', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            full_name: fullNameVal,
            email: emailVal,
            phone: phoneVal,
            password: passwordVal
        })
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            showAlert(data.message + " Redirecting to Login...", "success");
            setTimeout(() => {
                window.location.href = "/templates/login.html";
            }, 1500);
        } else {
            showAlert(data.message || "Registration failed.", "error");
        }
    })
    .catch(error => {
        console.error('Error:', error);
        showAlert("An error occurred. Make sure app.py is running and XAMPP MySQL is active.", "error");
    });
});
</script>

</body>
</html>
